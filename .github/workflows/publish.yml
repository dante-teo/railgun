name: Publish CLI

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify release version
        shell: bash
        run: |
          package_version="$(node -p "require('./package.json').version")"
          if [[ "${GITHUB_REF_NAME}" != "v${package_version}" ]]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version v${package_version}." >&2
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # prepublishOnly type-checks, tests, and builds before npm uploads anything.
      - name: Build, test, and publish
        run: npm publish --access public
