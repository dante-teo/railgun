name: Publish CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Check package version
        id: package
        shell: bash
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} is already published; nothing to do."
            echo "should_publish=false" >> "${GITHUB_OUTPUT}"
          else
            echo "Publishing ${package_name}@${package_version}."
            echo "should_publish=true" >> "${GITHUB_OUTPUT}"
          fi

      - name: Install dependencies
        if: steps.package.outputs.should_publish == 'true'
        run: pnpm install --frozen-lockfile

      # prepublishOnly type-checks, tests, builds, and smoke-tests the packaged
      # CLI launch path before npm uploads anything.
      - name: Build, test, and publish
        if: steps.package.outputs.should_publish == 'true'
        run: npm publish --access public
