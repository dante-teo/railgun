name: RailgunX

options:
  bundleIdPrefix: io.anvia
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    ARCHS: arm64
    SDKROOT: macosx
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: 0.1.0
    CURRENT_PROJECT_VERSION: 1

packages:
  Markdown:
    url: https://github.com/swiftlang/swift-markdown
    exactVersion: 0.8.0
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.4

targets:
  RailgunCore:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/RailgunCore

  RailgunTransport:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/RailgunTransport
    dependencies:
      - target: RailgunCore

  RailgunServices:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/RailgunServices
    dependencies:
      - target: RailgunCore
      - target: RailgunTransport

  RailgunUI:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/RailgunUI
    dependencies:
      - target: RailgunCore
      - package: Markdown
    settings:
      base:
        # swift-markdown 0.8.0 exports C targets whose module metadata is not
        # consumable by Xcode 26's explicit-module mode from a static target.
        SWIFT_ENABLE_EXPLICIT_MODULES: NO
        # XcodeGen's isolated validation keeps SourcePackages beside the
        # generated project, while launcher builds keep it in DerivedData.
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(PROJECT_DIR)/../SourcePackages/checkouts/swift-markdown/Sources/CAtomic/include"
          - "$(PROJECT_DIR)/../SourcePackages/checkouts/swift-cmark/src/include"
          - "$(PROJECT_DIR)/../SourcePackages/checkouts/swift-cmark/extensions/include"
          - "$(BUILD_DIR)/../../SourcePackages/checkouts/swift-markdown/Sources/CAtomic/include"
          - "$(BUILD_DIR)/../../SourcePackages/checkouts/swift-cmark/src/include"
          - "$(BUILD_DIR)/../../SourcePackages/checkouts/swift-cmark/extensions/include"

  RailgunTestSupport:
    type: library.static
    platform: macOS
    sources:
      - path: Sources/RailgunTestSupport
    dependencies:
      - target: RailgunCore
      - target: RailgunTransport
      - target: RailgunServices
      - sdk: XCTest.framework

  RailgunX:
    type: application
    platform: macOS
    sources:
      - path: Sources/RailgunX
      - path: Resources/Assets.xcassets
        buildPhase: resources
      - path: Resources/Legal
        buildPhase: resources
      - path: Resources/Fonts
        buildPhase: resources
    dependencies:
      - target: RailgunCore
      - target: RailgunTransport
      - target: RailgunServices
      - target: RailgunUI
      # RailgunUI owns the source dependency. The final app links Markdown
      # because RailgunUI is a static archive and cannot carry package objects.
      - package: Markdown
      - package: Sparkle
        product: Sparkle
        # XcodeGen's generic Embed Frameworks phase cannot infer Sparkle's
        # binary-package .framework extension; embed it explicitly below.
        embed: false
    preBuildScripts:
      - name: Stage Railgun Backend
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          stage_script="${SRCROOT}/scripts/stage-backend.sh"
          resources_directory="${TARGET_BUILD_DIR}/${UNLOCALIZED_RESOURCES_FOLDER_PATH}"

          if [[ ! -x "$stage_script" ]]; then
            echo "error: backend staging script is missing or not executable: $stage_script" >&2
            exit 1
          fi

          architecture="${CURRENT_ARCH:-}"
          if [[ -z "$architecture" || "$architecture" == "undefined_arch" ]]; then
            architecture="${ARCHS%% *}"
          fi

          "$stage_script" \
            --architecture "$architecture" \
            --output "$resources_directory"
    postBuildScripts:
      - name: Embed Sparkle Framework
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          source_framework="${BUILT_PRODUCTS_DIR}/Sparkle.framework"
          destination_framework="${TARGET_BUILD_DIR}/${FRAMEWORKS_FOLDER_PATH}/Sparkle.framework"

          if [[ ! -d "$source_framework" ]]; then
            echo "error: Sparkle.framework was not built at $source_framework" >&2
            exit 1
          fi

          if [[ ! -d "$destination_framework" ]]; then
            /usr/bin/ditto "$source_framework" "$destination_framework"
          fi

          if [[ "${CODE_SIGNING_ALLOWED:-NO}" == "YES" && -n "${EXPANDED_CODE_SIGN_IDENTITY:-}" ]]; then
            /usr/bin/codesign --force --sign "$EXPANDED_CODE_SIGN_IDENTITY" \
              --preserve-metadata=identifier,entitlements "$destination_framework"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.railgun
        PRODUCT_NAME: Railgun
        # Keep the source/test module stable while the distributed app is named Railgun.
        PRODUCT_MODULE_NAME: RailgunX
        PRODUCT_BUNDLE_PACKAGE_TYPE: APPL
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: Resources/Info.plist
        # Release tooling injects these from apps/desktop/package.json and the
        # tagged CI run. Keep the generated project independently buildable.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        RAILGUNX_SPARKLE_FEED_ARCHITECTURE: "$(CURRENT_ARCH)"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""
          RAILGUNX_SPARKLE_PUBLIC_EDDSA_KEY: ""
        Release:
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: GUKP6SNV36
          CODE_SIGN_ENTITLEMENTS: RailgunXRelease.entitlements
          ENABLE_HARDENED_RUNTIME: YES
          RAILGUNX_SPARKLE_PUBLIC_EDDSA_KEY: ""

  RailgunXTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/RailgunXTests
      - path: ../../fixtures/rpc/v1
        buildPhase: resources
    dependencies:
      - target: RailgunX
      - target: RailgunTestSupport
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.anvia.railgun.tests
        PRODUCT_NAME: RailgunXTests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Railgun.app/Contents/MacOS/Railgun"
        BUNDLE_LOADER: "$(TEST_HOST)"
      configs:
        Debug:
          CODE_SIGNING_ALLOWED: NO
          CODE_SIGNING_REQUIRED: NO
          CODE_SIGN_IDENTITY: ""

schemes:
  RailgunX:
    build:
      targets:
        RailgunX: all
        RailgunXTests: [test]
    test:
      targets:
        - RailgunXTests
    run:
      config: Debug

  RailgunX Source Backend:
    build:
      targets:
        RailgunX: all
        RailgunXTests: [test]
    test:
      targets:
        - RailgunXTests
    run:
      config: Debug
      commandLineArguments:
        "--railgunx-backend-mode=source": true
        "--railgunx-source-root=$(SRCROOT)/scripts/.railgun-source-root": true

  RailgunX Mock Backend:
    build:
      targets:
        RailgunX: all
        RailgunXTests: [test]
    test:
      targets:
        - RailgunXTests
    run:
      config: Debug
      commandLineArguments:
        "--railgunx-backend-mode=mock": true
        "--railgunx-mock-scenario=ready-idle": true
        "--railgunx-source-root=$(SRCROOT)/scripts/.railgun-source-root": true
