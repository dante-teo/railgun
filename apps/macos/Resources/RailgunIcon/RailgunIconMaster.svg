<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <title>Railgun full-color icon master</title>
  <desc>Segmented orbital rails frame a cyan forward beam and amber signal.</desc>
  <rect x="64" y="64" width="896" height="896" rx="224" fill="#0B1220"/>
  <rect x="65.5" y="65.5" width="893" height="893" rx="222.5" stroke="#334155" stroke-opacity="0.7" stroke-width="3"/>

  <!-- Interrupted orbital rails. Their gaps create the forward direction. -->
  <path d="M267 730A360 360 0 0 1 734 242" stroke="#64748B" stroke-opacity="0.9" stroke-width="52" stroke-linecap="butt"/>
  <path d="M790 312A360 360 0 0 1 320 782" stroke="#475569" stroke-opacity="0.95" stroke-width="52" stroke-linecap="butt"/>
  <path d="M267 730A360 360 0 0 1 320 782" stroke="#22D3EE" stroke-width="52" stroke-linecap="butt"/>
  <path d="M734 216L816 298L772 342L690 260Z" fill="#FBBF24"/>

  <!-- Central aperture and beam. -->
  <circle cx="512" cy="512" r="128" fill="#0B1220" stroke="#64748B" stroke-width="40"/>
  <path d="M459 565L279 745L322 788L504 606L686 424L745 279L600 337L459 478Z" fill="#0F1D31" stroke="#334155" stroke-width="12" stroke-linejoin="round"/>
  <path d="M304 761L722 303L749 276L719 350L348 782Z" fill="#22D3EE"/>
  <path d="M347 743L710 347L724 304L694 363L377 758Z" fill="#CFFAFE" fill-opacity="0.95"/>
  <circle cx="512" cy="512" r="84" fill="#FBBF24"/>
  <circle cx="512" cy="512" r="66" fill="#0B1220"/>

  <!-- Small registration highlight keeps the silhouette legible at small sizes. -->
  <path d="M226 718L276 768" stroke="#67E8F9" stroke-width="8" stroke-linecap="round"/>
  <path d="M748 256L798 306" stroke="rgb(253,230,138)" stroke-width="8" stroke-linecap="round"/>
</svg>
